{% extends "base.html" %}

{% block title %}Novo Produto{% endblock %}

{% block content %}

<div class="card" style="padding: 24px 26px;">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:20px; flex-wrap:wrap;">
        <div>
            <h1 class="page-title" style="font-size:32px; margin:0 0 6px 0;">Novo Produto</h1>
            <p class="page-subtitle" style="font-size:16px; margin:0;">
                Cadastre produtos por kg ou por unidade.
            </p>
        </div>

        <a href="/produtos/" class="btn" style="background:#6b7280;">Voltar</a>
    </div>
</div>

<div class="card" style="padding: 26px;">
    <form method="POST">
        <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:20px;">

            <div>
                <label style="font-weight:700;">Nome do Produto</label><br>
                <input type="text" name="nome" required>
            </div>

            <div>
                <label style="font-weight:700;">Código</label><br>
                <input type="text" name="codigo">
            </div>

            <div>
                <label style="font-weight:700;">Tipo</label><br>
                <select name="tipo" required>
                    <option value="kg">Kg</option>
                    <option value="unidade">Unidade</option>
                </select>
            </div>

            <div>
                <label style="font-weight:700;">Preço</label><br>
                <input type="number" step="0.01" name="preco" required>
            </div>

            <div>
                <label style="font-weight:700;">Estoque Inicial</label><br>
                <input type="number" step="0.01" name="estoque">
            </div>

        </div>

        <div style="margin-top:24px;">
            <button type="submit" class="btn" style="font-size:18px; padding:14px 22px;">
                Salvar Produto
            </button>
        </div>
    </form>
</div>

{% endblock %}
