<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Frigomag{% endblock %}</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f6f2f4;
            color: #2b2b2b;
            display: flex;
        }

        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #7B1E3A 0%, #5E152C 100%);
            min-height: 100vh;
            padding: 24px 18px;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.08);
        }

        .sidebar h2 {
            margin: 0 0 30px 0;
            color: #ffffff;
            font-size: 34px;
            font-weight: bold;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu a {
            display: block;
            color: #fff;
            text-decoration: none;
            padding: 12px 14px;
            border-radius: 10px;
            transition: 0.2s;
            font-weight: 600;
        }

        .menu a:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        .content {
            flex: 1;
            padding: 28px;
        }

        .topbar {
            background: #ffffff;
            border-radius: 16px;
            padding: 18px 22px;
            margin-bottom: 22px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            border-left: 6px solid #7B1E3A;
        }

        .topbar h1 {
            margin: 0;
            color: #7B1E3A;
            font-size: 28px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            background: #7B1E3A;
            color: #fff;
            text-decoration: none;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {
            background: #5E152C;
        }

        .btn-green {
            background: #7B1E3A;
            color: #fff;
        }

        .btn-green:hover {
            background: #5E152C;
        }

        input, select {
            width: 320px;
            padding: 10px 12px;
            border: 1px solid #d9c7cf;
            border-radius: 10px;
            outline: none;
            background: #fff;
        }

        input:focus, select:focus {
            border-color: #7B1E3A;
            box-shadow: 0 0 0 3px rgba(123, 30, 58, 0.12);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 18px;
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
        }

        table th {
            background: #7B1E3A;
            color: #fff;
            padding: 14px;
            text-align: left;
        }

        table td {
            padding: 14px;
            border-bottom: 1px solid #eee;
        }

        table tr:hover td {
            background: #faf5f7;
        }

        .page-title {
            margin: 0 0 8px 0;
            font-size: 20px;
            color: #7B1E3A;
        }

        .page-subtitle {
            margin: 0;
            color: #666;
        }

        @media (max-width: 1200px) {
            .content div[style*="grid-template-columns: repeat(5, 1fr)"] {
                grid-template-columns: repeat(2, 1fr) !important;
            }
        }

        @media (max-width: 700px) {
            .content div[style*="grid-template-columns: repeat(5, 1fr)"] {
                grid-template-columns: 1fr !important;
            }

            .sidebar {
                width: 200px;
            }

            input, select {
                width: 100%;
            }
        }

        @media (max-width: 1200px) {
            .content div[style*="grid-template-columns: repeat(5, 1fr)"] {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            .content div[style*="grid-template-columns: repeat(3, 1fr)"] {
                grid-template-columns: 1fr !important;
            }
        }

        @media (max-width: 700px) {
            .content div[style*="grid-template-columns: repeat(5, 1fr)"] {
                grid-template-columns: 1fr !important;
            }

            .sidebar {
                width: 200px;
            }

            input, select {
                width: 100%;
            }
        }

        @media (max-width: 1200px) {
            .content div[style*="grid-template-columns: repeat(5, 1fr)"] {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            .content div[style*="grid-template-columns: repeat(3, 1fr)"] {
                grid-template-columns: 1fr !important;
            }
        }

        @media (max-width: 700px) {
            .content div[style*="grid-template-columns"] {
                grid-template-columns: 1fr !important;
            }

            .sidebar {
                width: 200px;
            }

            input, select {
                width: 100%;
            }
        }

        @media (max-width: 1200px) {
            .content div[style*="grid-template-columns: repeat(5, 1fr)"] {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            .content div[style*="grid-template-columns: repeat(3, 1fr)"] {
                grid-template-columns: 1fr !important;
            }

            .content div[style*="grid-template-columns: 1.3fr 1fr"] {
                grid-template-columns: 1fr !important;
            }
        }

        @media (max-width: 700px) {
            .content div[style*="grid-template-columns: repeat(5, 1fr)"] {
                grid-template-columns: 1fr !important;
            }
        }

        @media (max-width: 1200px) {
            .content div[style*="grid-template-columns: repeat(4, 1fr)"] {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            .content div[style*="grid-template-columns: repeat(2, 1fr)"] {
                grid-template-columns: 1fr !important;
            }
        }

        @media (max-width: 700px) {
            .content div[style*="grid-template-columns: repeat(4, 1fr)"] {
                grid-template-columns: 1fr !important;
            }
        }

        /* ===== SIDEBAR PREMIUM ===== */

        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #7B1E3A 0%, #5E152C 100%);
            color: white;
            padding: 20px;
            min-height: 100vh;
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 30px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu a {
            text-decoration: none;
            color: #f3dfe6;
            padding: 12px 14px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu a:hover {
            background: rgba(255,255,255,0.08);
            color: #ffffff;
        }

        .menu a.active {
            background: #ffffff;
            color: #7B1E3A;
            font-weight: 800;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2 class="logo">Frigomag</h2>

        <div class="menu">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">
                📊 Dashboard
            </a>

            <a href="/caixa-diario/" class="{% if '/caixa-diario' in request.path or '/vendas' in request.path %}active{% endif %}">
                💰 Caixa
            </a>

            <a href="/produtos/" class="{% if '/produtos' in request.path %}active{% endif %}">
                📦 Produtos
            </a>

            <a href="/estoque/" class="{% if '/estoque' in request.path %}active{% endif %}">
                📚 Estoque
            </a>

            <a href="/compras/" class="{% if '/compras' in request.path %}active{% endif %}">
                🛒 Compras
            </a>

            <a href="/relatorios/" class="{% if '/relatorios' in request.path %}active{% endif %}">
                📈 Relatórios
            </a>

            <a href="/financeiro/" class="{% if '/financeiro' in request.path %}active{% endif %}">
                💳 Financeiro
            </a>
        </div>
    </div>

    <div class="content">
        <div class="topbar">
            <h1>Sistema de Vendas Frigomag</h1>
        </div>

        {% block content %}{% endblock %}
    </div>

</body>
</html>
