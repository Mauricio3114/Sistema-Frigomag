<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Caixa Frigomag{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f6f2f4;
            color: #2b2b2b;
        }

        .caixa-wrapper {
            padding: 18px;
            width: 100%;
        }

        .topbar-caixa {
            background: #ffffff;
            border-radius: 16px;
            padding: 14px 22px;
            margin-bottom: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            border-left: 6px solid #7B1E3A;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .topbar-caixa .titulo {
            font-size: 42px;
            font-weight: 900;
            color: #7B1E3A;
            line-height: 1;
        }

        .topbar-caixa .subtitulo {
            font-size: 18px;
            font-weight: 700;
            color: #666;
            text-align: right;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 18px 20px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.06);
            margin-bottom: 16px;
        }

        .btn {
            display: inline-block;
            background: #7B1E3A;
            color: #fff;
            text-decoration: none;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {
            background: #5E152C;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d9c7cf;
            border-radius: 12px;
            outline: none;
            background: #fff;
        }

        input:focus, select:focus {
            border-color: #7B1E3A;
            box-shadow: 0 0 0 3px rgba(123, 30, 58, 0.12);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
        }

        table th {
            background: #7B1E3A;
            color: #fff;
            padding: 14px;
            text-align: left;
            font-size: 16px;
        }

        table td {
            padding: 14px;
            border-bottom: 1px solid #eee;
            font-size: 18px;
        }

        table tr:hover td {
            background: #faf5f7;
        }

        .btn-pagamento {
            padding: 20px 24px;
            font-size: 20px;
            font-weight: 800;
            border-radius: 14px;
            border: 2px solid #d8c0c8;
            cursor: pointer;
            background: #ffffff;
            color: #444;
            transition: 0.2s;
            min-width: 170px;
            text-align: center;
        }

        .btn-pagamento:hover {
            border-color: #7B1E3A;
            background: #faf5f7;
        }

        .btn-pagamento.ativo {
            background: #7B1E3A;
            color: #ffffff;
            border-color: #7B1E3A;
        }

        @media (max-width: 1000px) {
            .topbar-caixa {
                flex-direction: column;
                align-items: flex-start;
            }

            .topbar-caixa .subtitulo {
                text-align: left;
            }
        }

        .subtitulo-link {
            font-size: 18px;
            font-weight: 700;
            color: #666;
            text-align: right;
            text-decoration: none;
            transition: 0.2s;
        }

        .subtitulo-link:hover {
            color: #7B1E3A;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="caixa-wrapper">
        <div class="topbar-caixa">
            <div class="titulo">CAIXA</div>
            <a href="/" class="subtitulo-link">Sistema de Vendas Frigomag</a>
        </div>

        {% block content %}{% endblock %}
    </div>

</body>
</html>
