{% extends "base.html" %}

{% block title %}Entradas e Saídas{% endblock %}

{% block content %}

<div class="card">
    <h1 class="page-title">Entradas e Saídas</h1>
    <p class="page-subtitle">Controle financeiro do período.</p>

    <form method="GET" style="margin-top:20px; display:flex; gap:10px;">
        <input type="date" name="data_inicio" value="{{ data_inicio }}">
        <input type="date" name="data_fim" value="{{ data_fim }}">
        <button class="btn">Filtrar</button>
    </form>
</div>

<div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin-top:20px;">

    <div class="card">
        <h3>Entradas</h3>
        <p style="font-size:28px; color:#16a34a;">
            R$ {{ "%.2f"|format(total_entrada) }}
        </p>
    </div>

    <div class="card">
        <h3>Saídas</h3>
        <p style="font-size:28px; color:#dc2626;">
            R$ {{ "%.2f"|format(total_saida) }}
        </p>
    </div>

    <div class="card">
        <h3>Saldo</h3>
        <p style="font-size:32px; font-weight:bold;">
            R$ {{ "%.2f"|format(saldo) }}
        </p>
    </div>

</div>

{% endblock %}
